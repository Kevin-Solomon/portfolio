<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin Solomon — Engineering Impact Log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg-gradient: linear-gradient(180deg, #0e0e16 0%, #0a0a0f 300px);
    --surface: #111118;
    --surface-2: #1a1a24;
    --surface-3: #22222e;
    --border: #2a2a35;
    --border-hover: #3a3a48;
    --text: #e8e6e3;
    --text-dim: #8b8a8e;
    --text-muted: #5a5a64;
    --accent: #f59e0b;
    --accent-soft: rgba(245, 158, 11, 0.1);
    --accent-glow: rgba(245, 158, 11, 0.05);
    --incident: #f45d48;
    --incident-soft: rgba(244, 93, 72, 0.08);
    --feature: #6366f1;
    --feature-soft: rgba(99, 102, 241, 0.08);
    --optimization: #22c55e;
    --optimization-soft: rgba(34, 197, 94, 0.08);
    --infra: #06b6d4;
    --infra-soft: rgba(6, 182, 212, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    line-height: 1.6;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* Hero */
  .hero {
    background: var(--bg-gradient);
    padding: 56px 20px 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .hero-inner {
    max-width: 800px;
    margin: 0 auto;
  }

  .hero-eyebrow {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .hero h1 {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .hero-role {
    font-size: 15px;
    color: var(--text-dim);
    margin-bottom: 32px;
  }

  .hero-role a {
    color: var(--accent);
    text-decoration: none;
  }

  .hero-role a:hover { text-decoration: underline; }

  /* Stats Bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 16px;
    text-align: center;
    transition: border-color 0.2s, transform 0.2s;
  }

  .stat-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
  }

  .stat-value {
    font-size: 26px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.2;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 4px;
  }

  /* Sticky Nav */
  .filter-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10, 10, 15, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    margin: 0 -20px 32px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover {
    border-color: var(--text-dim);
    color: var(--text);
  }

  .filter-btn.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }

  .filter-btn.active-incident { background: var(--incident-soft); border-color: var(--incident); color: var(--incident); }
  .filter-btn.active-feature { background: var(--feature-soft); border-color: var(--feature); color: var(--feature); }
  .filter-btn.active-optimization { background: var(--optimization-soft); border-color: var(--optimization); color: var(--optimization); }
  .filter-btn.active-infra { background: var(--infra-soft); border-color: var(--infra); color: var(--infra); }

  .filter-count {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Achievement Cards */
  .achievement-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;
    transition: border-color 0.2s, opacity 0.3s, transform 0.3s;
    opacity: 0;
    transform: translateY(16px);
  }

  .achievement-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .achievement-card.hidden-by-filter {
    display: none;
  }

  .achievement-card:hover { border-color: var(--border-hover); }

  .card-header-row {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    cursor: pointer;
    padding: 24px 28px;
    transition: background 0.15s;
  }

  .card-header-row:hover {
    background: rgba(255,255,255,0.01);
  }

  .card-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-muted);
    min-width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    background: var(--surface-2);
    flex-shrink: 0;
    margin-top: 2px;
  }

  .card-header-content {
    flex: 1;
    min-width: 0;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .card-stripe-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .card-stripe-dot.incident { background: var(--incident); }
  .card-stripe-dot.feature { background: var(--feature); }
  .card-stripe-dot.optimization { background: var(--optimization); }
  .card-stripe-dot.infra { background: var(--infra); }

  .date-badge {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
  }

  .type-tag {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 2px 8px;
    border-radius: 3px;
  }

  .type-tag.incident { background: var(--incident-soft); color: var(--incident); }
  .type-tag.feature { background: var(--feature-soft); color: var(--feature); }
  .type-tag.optimization { background: var(--optimization-soft); color: var(--optimization); }
  .type-tag.infra { background: var(--infra-soft); color: var(--infra); }

  .card-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .card-subtitle {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .card-chevron {
    color: var(--text-muted);
    font-size: 18px;
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 4px;
    user-select: none;
  }

  .achievement-card.expanded .card-chevron {
    transform: rotate(180deg);
  }

  /* Expandable Body */
  .card-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }

  .card-body-inner {
    padding: 16px 28px 28px;
    padding-left: 72px;
  }

  .impact-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .impact-metric {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 14px 16px;
    background: var(--surface-2);
    text-align: center;
  }

  .impact-value {
    font-size: 16px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
  }

  .impact-label {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Sections */
  .card-section { margin-bottom: 20px; }
  .card-section:last-child { margin-bottom: 0; }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .card-section p {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
  }

  .card-section code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: var(--surface-2);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent);
  }

  .impact-list {
    list-style: none;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .impact-list li {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    padding: 10px 14px;
    background: var(--surface-2);
    border-radius: 6px;
    border-left: 3px solid var(--accent);
  }

  .impact-list li strong {
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .bottom-line {
    margin-top: 20px;
    padding: 14px 18px;
    background: var(--accent-glow);
    border: 1px solid rgba(245, 158, 11, 0.12);
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
  }

  .bottom-line strong { color: var(--accent); }

  /* Footer */
  .footer {
    text-align: center;
    padding: 40px 0 0;
    border-top: 1px solid var(--border);
    margin-top: 20px;
    color: var(--text-muted);
    font-size: 12px;
  }

  /* Print */
  @media print {
    body { background: #fff; color: #111; }
    .filter-bar { display: none; }
    .hero { background: none; border-bottom: 2px solid #111; }
    .hero h1 { color: #111; }
    .hero-eyebrow { color: #666; }
    .hero-role { color: #444; }
    .stat-card { border: 1px solid #ddd; }
    .stat-value { color: #111; }
    .stat-label { color: #666; }
    .achievement-card {
      opacity: 1 !important;
      transform: none !important;
      break-inside: avoid;
      border: 1px solid #ddd;
      background: #fff;
    }
    .card-body {
      max-height: none !important;
      overflow: visible !important;
    }
    .card-chevron { display: none; }
    .card-header-row { cursor: default; }
    .impact-metric { background: #f5f5f5; }
    .impact-list li { background: #f5f5f5; border-left-color: #f59e0b; }
    .bottom-line { background: #fffbeb; border-color: #f59e0b; }
    .card-section p, .impact-list li { color: #222; }
    .section-title { color: #666; }
    .card-subtitle { color: #555; }
    .footer { display: none; }
  }

  /* Mobile */
  @media (max-width: 640px) {
    .hero { padding: 32px 16px 28px; }
    .hero h1 { font-size: 26px; }
    .container { padding: 0 16px 60px; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat-card { padding: 14px 12px; }
    .stat-value { font-size: 20px; }
    .card-header-row { padding: 18px 16px; gap: 12px; }
    .card-body-inner { padding: 0 16px 20px; padding-left: 16px; }
    .card-title { font-size: 16px; }
    .card-number { min-width: 24px; height: 24px; font-size: 12px; }
    .impact-strip { grid-template-columns: repeat(2, 1fr); }
    .impact-value { font-size: 14px; }
    .filter-bar { padding: 10px 16px; margin: 0 -16px 24px; gap: 6px; }
    .filter-btn { font-size: 11px; padding: 5px 10px; }
  }
</style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">Engineering Impact Log</div>
    <h1>Kevin Solomon</h1>
    <div class="hero-role">Software Engineer at <a href="https://curaahome.com/" target="_blank">House of X</a> — building and breaking production systems for CÜRAA</div>
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-value" style="color:var(--accent);">10</div>
        <div class="stat-label">Achievements</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--optimization);">930+</div>
        <div class="stat-label">Hours Saved / yr</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">$133K+</div>
        <div class="stat-label">Revenue Protected / yr</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">$48K+</div>
        <div class="stat-label">Cost Savings / yr</div>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <!-- Filter Bar -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all" onclick="filterCards('all', this)">All</button>
    <button class="filter-btn" data-filter="incident" onclick="filterCards('incident', this)">Incidents</button>
    <button class="filter-btn" data-filter="feature" onclick="filterCards('feature', this)">Features</button>
    <button class="filter-btn" data-filter="optimization" onclick="filterCards('optimization', this)">Optimization</button>
    <button class="filter-btn" data-filter="infra" onclick="filterCards('infra', this)">Infrastructure</button>
    <span class="filter-count" id="filter-count">10 of 10</span>
  </div>

  <div id="achievements"></div>

  <div class="footer">Kevin Solomon — Engineering Impact Log — 2026</div>
</div>

<script>
const achievements = [
  {
    num: "01",
    date: "May 13, 2026",
    type: "incident",
    typeLabel: "SEV-1 Incident",
    title: "Order Placement Outage — 14-Hour RCA & Recovery",
    subtitle: "Led the investigation and resolution of a critical 14-hour outage where 100% of order placements failed. Identified root cause, restored service, and established 6 new engineering practices.",
    metrics: [
      { value: "SEV-1", label: "Severity" },
      { value: "20 min", label: "Resolution Time" },
      { value: "251", label: "Users Impacted" },
      { value: "0", label: "Data Loss" }
    ],
    sections: [
      { title: "What Happened", text: `A routine deployment (ShipRocket integration) included a debugging tool called axios-curlirize that had a hidden flaw. It created a circular reference in the data it handled, like two mirrors facing each other creating infinite reflections. When our logging system tried to record this data, it crashed. Since logging runs on every order request, every single order failed from 10:50 PM on May 12 until 12:40 PM on May 13. No automated alert existed for order failures, so the outage went undetected for ~12 hours until the marketing team noticed no orders had come through.` },
      { title: "What I Did", text: `Traced the failure to the recent deployment and rolled it back to restore service immediately. Then did a deeper investigation the next day to find the true root cause: it wasn't just the debugging tool, it was that our logging system was fragile enough that a single bad data structure could take down the entire order pipeline. Made the logging system resilient to handle unexpected data without crashing. Prepared a full incident report for leadership with root cause analysis, business impact (251 impacted users, 76 of whom had clicked place order), and a retargeting campaign plan for affected customers.` }
    ],
    impact: [
      `<strong>Service fully restored</strong> with zero data loss. No partial or corrupted orders were created`,
      `<strong>Root cause identified beyond the surface</strong>, rolling back fixed the symptom, but the investigation revealed the logging fragility that could have been triggered by something else later`,
      `<strong>Logging system hardened</strong> so it can never take down a customer request again`,
      `<strong>Retargeting campaign planned</strong> for the 251 impacted users (76 had clicked place order) to recover lost conversions`
    ],
    extraSection: {
      title: "Practices Established",
      items: [
        `<strong>Real-time order health monitoring</strong>, automated alerts fire within minutes if order success rates drop. No more 12-hour blind spots`,
        `<strong>Mandatory staging validation</strong> before production for any change touching order flow, no exceptions`,
        `<strong>Third-party tool vetting</strong> for anything that runs alongside the order pipeline, including helper and debugging tools`,
        `<strong>Post-deployment smoke test</strong>, an automated test places a sample order end-to-end after every deploy. If it fails, the deployment is flagged immediately`,
        `<strong>Crash-proof supporting systems</strong>, logging, analytics, and debugging tools are isolated from order processing. If they fail, they fail silently`,
        `<strong>Quarterly order flow resilience reviews</strong> to catch new risks before they become incidents`
      ]
    },
    bottomLine: `Turned a critical 14-hour outage into a catalyst for 6 permanent engineering practices that protect the most important pipeline in the business. The fix wasn't just restoring service, it was making sure this class of failure can never happen again.`
  },
  {
    num: "02",
    date: "March 24, 2026",
    type: "incident",
    typeLabel: "Incident Response",
    title: "NodeJS ECS Server Crash — Event Emitter Fix",
    subtitle: "Production server was crashing every time an unhandled error event fired, taking down the entire API and blocking all orders.",
    metrics: [
      { value: "20 min", label: "Resolution Time" },
      { value: "50", label: "Orders Protected" },
      { value: "$42K", label: "Revenue Protected / yr" },
      { value: "72 hrs", label: "Eng Time Saved / yr" }
    ],
    sections: [
      { title: "What Happened", text: `A Node.js EventEmitter was emitting error events without a registered listener. In Node.js, this kills the process. The entire ECS-hosted API server crashed, blocking all order processing. 50 orders were immediately impacted and the CX team was flooded with complaints across WhatsApp, Email, and Instagram. This wasn't a one-off — we had over 5 instances of this crash, each time impacting more and more orders as traffic grew. The blast radius was escalating with every occurrence.` },
      { title: "What I Did", text: `Identified the missing <code>.on('error')</code> handler, pushed a hotfix in 20 minutes. The process now logs and handles error events gracefully instead of crashing.` }
    ],
    impact: [
      `<strong>$42,000/year</strong> in revenue protected — each crash put 50+ orders at risk, with the impact growing every time`,
      `<strong>72 engineering hours/year</strong> saved — that's 9 full working days no longer spent on crash recovery and monitoring`,
      `<strong>5+ recurring crashes stopped</strong> — this wasn't a one-off; each instance hit harder than the last as order volume scaled, and the fix eliminated the entire class of failures permanently`
    ],
    bottomLine: `A 20-minute fix that prevents $42,000/year in lost revenue. Without it, the team would still be firefighting server crashes twice a month instead of building features.`
  },
  {
    num: "03",
    date: "January 19, 2026",
    type: "incident",
    typeLabel: "Incident Response",
    title: "Third-Party API Error Handling — Retry Storm Fix",
    subtitle: "Unhandled API failures were spamming customers with 15+ duplicate messages and creating ghost orders that required hours of manual cleanup.",
    metrics: [
      { value: "100+", label: "Orders Stabilized" },
      { value: "1,500+", label: "Spam Msgs Prevented" },
      { value: "$42K", label: "Revenue Protected / yr" },
      { value: "36 hrs", label: "Eng Time Saved / yr" }
    ],
    sections: [
      { title: "What Happened", text: `Third-party API failures cascaded through the order pipeline unchecked, causing retry storms that sent 15+ duplicate messages per customer. Each incident created 100+ ghost orders on Shopify that had to be manually cancelled, cross-verified with the internal system, and reconciled against the database. The full cleanup took 1-2 hours every time.` },
      { title: "What I Did", text: `Wrapped all third-party API calls in proper error boundaries with try-catch blocks. Failed operations now get caught and re-inserted into the processing queue for controlled retry — instead of uncontrolled retry storms.` }
    ],
    impact: [
      `<strong>$42,000/year</strong> in revenue protected — 100 orders at risk per incident, at least once a month`,
      `<strong>36 engineering hours/year</strong> saved — eliminated 1-2 hours of manual Shopify cleanup per incident`,
      `<strong>18,000+ spam messages/year</strong> prevented — stopped 1,500+ unwanted messages per incident from hitting customers`
    ],
    bottomLine: `A few try-catch blocks turned $42,000/year in recurring chaos into a non-issue. The hidden cost was customer trust — a single spam storm of 15+ messages per customer drives chargebacks, negative reviews, and permanent churn.`
  },
  {
    num: "04",
    type: "feature",
    typeLabel: "Automation",
    title: "Snapmint Payment Reconciler",
    subtitle: "Eliminated 2-3 daily CX complaints about unsynced Snapmint orders by automating reconciliation. Resolution time dropped from days to minutes.",
    metrics: [
      { value: "2-3/day", label: "CX Complaints Eliminated" },
      { value: "3-7 days", label: "Sync Delay Removed" },
      { value: "730+", label: "Orders Auto-Synced / yr" },
      { value: "30 min", label: "Max Resolution Time" }
    ],
    sections: [
      { title: "What Happened", text: `Every day we received at least 2-3 queries about Snapmint orders not syncing — on high-traffic days the number would double. Snapmint's APIs were taking too long to resolve order statuses, leaving paid orders unsynced in our database and Shopify. Customers would see no confirmation, panic, and flood CX on WhatsApp demanding cancellations or refunds — sometimes a week after paying. This was destroying trust. Every time a complaint came in, I had to stop what I was working on, query the database to find the user, run a manual update query, and insert the order into our SQS service to trigger the sync. Pure context-switching overhead that pulled me away from feature work.` },
      { title: "What I Did", text: `Built a cron job that runs every 30 minutes, scans all orders from the last 24 hours that are marked as paid but not synced in our database or Shopify, and automatically triggers the sync through SQS. The entire manual workflow — database lookup, update query, SQS insertion — is now fully automated.` }
    ],
    impact: [
      `<strong>CX complaints dropped to zero</strong> — went from 2-3 daily complaints (4-6 on high-traffic days) to none after going live`,
      `<strong>Resolution time: days → minutes</strong> — orders that used to sit unsynced for 3-7 days now sync within 30 minutes automatically`,
      `<strong>Eliminated constant context switching</strong> — no longer getting pulled out of feature work multiple times a day to manually fix sync issues`,
      `<strong>Customer trust restored</strong> — customers who paid for orders no longer wait days wondering if their purchase went through`
    ],
    bottomLine: `A single cron job eliminated a daily source of CX complaints, freed up engineering time that was being lost to repetitive manual fixes, and restored customer trust in the payment experience. The best part — since going live, not a single complaint from CX about unsynced Snapmint orders.`
  },
  {
    num: "05",
    type: "feature",
    typeLabel: "Architecture",
    title: "Payments and Refunds Module",
    subtitle: "Rebuilt the payments architecture using Factory and Strategy patterns during the Juspay → PhonePe migration. New provider integrations dropped from 1 month to under 1 week.",
    metrics: [
      { value: "1 mo → 1 wk", label: "Integration Time" },
      { value: "36K+", label: "Orders Processed" },
      { value: "₹9Cr+", label: "Total Order Value" },
      { value: "3", label: "Providers Onboarded" }

// Render
const container = document.getElementById('achievements');

function renderCards() {
  container.innerHTML = '';
  achievements.forEach((a) => {
    const card = document.createElement('div');
    card.className = 'achievement-card';
    card.dataset.type = a.type;

    const extraHTML = a.extraSection ? `
      <div class="card-section">
        <div class="section-title">${a.extraSection.title}</div>
        <ul class="impact-list">
          ${a.extraSection.items.map(item => `<li>${item}</li>`).join('')}
        </ul>
      </div>` : '';

    card.innerHTML = `
      <div class="card-header-row" onclick="toggleCard(this)">
        <div class="card-number">${a.num}</div>
        <div class="card-header-content">
          <div class="card-meta">
            <span class="card-stripe-dot ${a.type}"></span>
            ${a.date ? `<span class="date-badge">${a.date}</span>` : ''}
            <span class="type-tag ${a.type}">${a.typeLabel}</span>
          </div>
          <div class="card-title">${a.title}</div>
          <div class="card-subtitle">${a.subtitle}</div>
        </div>
        <div class="card-chevron">▾</div>
      </div>
      <div class="card-body">
        <div class="card-body-inner">
          <div class="impact-strip">
            ${a.metrics.map(m => `
              <div class="impact-metric">
                <div class="impact-value">${m.value}</div>
                <div class="impact-label">${m.label}</div>
              </div>`).join('')}
          </div>
          ${a.sections.map(s => `
            <div class="card-section">
              <div class="section-title">${s.title}</div>
              <p>${s.text}</p>
            </div>`).join('')}
          <div class="card-section">
            <div class="section-title">Impact</div>
            <ul class="impact-list">
              ${a.impact.map(i => `<li>${i}</li>`).join('')}
            </ul>
          </div>
          ${extraHTML}
          <div class="bottom-line">
            <strong>Bottom line:</strong> ${a.bottomLine}
          </div>
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  // Scroll animation
  requestAnimationFrame(() => {
    document.querySelectorAll('.achievement-card').forEach((card, i) => {
      setTimeout(() => card.classList.add('visible'), i * 80);
    });
  });
}

function toggleCard(header) {
  const card = header.closest('.achievement-card');
  const body = card.querySelector('.card-body');
  if (card.classList.contains('expanded')) {
    card.classList.remove('expanded');
    body.style.maxHeight = '0';
  } else {
    card.classList.add('expanded');
    body.style.maxHeight = body.scrollHeight + 'px';
  }
}

function filterCards(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.className = 'filter-btn';
  });
  if (type === 'all') {
    btn.classList.add('active');
  } else {
    btn.classList.add('active-' + type);
  }

  const cards = document.querySelectorAll('.achievement-card');
  let visible = 0;
  cards.forEach(card => {
    if (type === 'all' || card.dataset.type === type) {
      card.classList.remove('hidden-by-filter');
      visible++;
    } else {
      card.classList.add('hidden-by-filter');
    }
  });
  document.getElementById('filter-count').textContent = `${visible} of ${achievements.length}`;
}

renderCards();
</script>
